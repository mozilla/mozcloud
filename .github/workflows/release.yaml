name: release

on:
  push:
    branches: [main]
    tags:
      - 'tools/mzcld/v*'
      - 'tools/mozcloud-mcp/v*'
      - 'tools/render-diff/v*'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to run'
        required: true
        type: choice
        default: latest
        options: [latest, release]
      tool:
        description: 'Tool (release mode only)'
        required: false
        type: choice
        default: mzcld
        options: [mzcld, mozcloud-mcp, render-diff]
      version:
        description: 'Version tag e.g. v1.2.3 (release mode only)'
        required: false
        type: string

permissions:
  contents: read

env:
  RELEASE_BUCKET: "moz-fx-platform-shared-global-mozcloud-tools"
  WIF_SERVICE_ACCOUNT: "bucket-object-user@moz-fx-platform-artifacts.iam.gserviceaccount.com"

jobs:
  # -----------------------------------------------------------------
  # Tag push → immutable versioned release at <tool>/vX.Y.Z/
  # Tag format: tools/<tool>/v<version>
  # -----------------------------------------------------------------
  release:
    if: |
      startsWith(github.ref, 'refs/tags/tools/') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Parse tool and version
        id: parse
        env:
          INPUT_TOOL: ${{ inputs.tool }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tool="${INPUT_TOOL}"
            version="${INPUT_VERSION}"
            if [ -z "${tool}" ] || [ -z "${version}" ]; then
              echo "release mode requires both 'tool' and 'version' inputs" >&2
              exit 1
            fi
          else
            full="${GITHUB_REF_NAME}"
            rest="${full#tools/}"
            tool="${rest%%/*}"
            version="${rest#*/}"
          fi
          echo "tool=${tool}"       >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: tools/${{ steps.parse.outputs.tool }}/go.mod
          cache: false

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.GCPV2_GITHUB_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8
        with:
          distribution: goreleaser
          version: "~> v2"
          workdir: tools/${{ steps.parse.outputs.tool }}
          args: release --clean
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.parse.outputs.version }}
          UPLOAD_DIR: ${{ steps.parse.outputs.version }}
          RELEASE_BUCKET: ${{ env.RELEASE_BUCKET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------------------------
  # Main push → rolling "latest" at <tool>/latest/ for all three tools.
  # Snapshot mode skips goreleaser's publish pipe (incl. blobs upload),
  # so we build archives with goreleaser then upload to GCS explicitly.
  # Version stamp uses the main commit SHA.
  # -----------------------------------------------------------------
  latest:
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.mode == 'latest'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        tool: [mzcld, mozcloud-mcp, render-diff]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: tools/${{ matrix.tool }}/go.mod
          cache: false

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.GCPV2_GITHUB_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8
        with:
          distribution: goreleaser
          version: "~> v2"
          workdir: tools/${{ matrix.tool }}
          args: release --snapshot --clean
        env:
          GORELEASER_CURRENT_TAG: ${{ github.sha }}

      - name: Upload latest archives to GCS
        run: |
          set -euo pipefail
          tool="${{ matrix.tool }}"
          dist="tools/${tool}/dist"
          dest="gs://${RELEASE_BUCKET}/${tool}/latest/"
          staging="$(mktemp -d)"
          # Goreleaser archives are named "<tool>_<version>_<os>_<arch>.tar.gz".
          # Drop the version segment so latest/ has stable filenames that
          # overwrite cleanly on every run.
          for f in "${dist}"/*.tar.gz; do
            base="$(basename "$f")"
            stable="$(echo "$base" | sed -E "s|^(${tool})_[^_]+_(.+)\\.tar\\.gz$|\\1_\\2.tar.gz|")"
            cp "$f" "${staging}/${stable}"
          done
          gcloud storage cp "${staging}"/*.tar.gz "${dest}"
          if [ -f "${dist}/checksums.txt" ]; then
            gcloud storage cp "${dist}/checksums.txt" "${dest}"
          fi
