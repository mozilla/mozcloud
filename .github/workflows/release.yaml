name: release

on:
  push:
    branches: [main]
    tags:
      - 'mzcld/v*'
      - 'mozcloud-mcp/v*'
      - 'render-diff/v*'

permissions:
  contents: read

env:
  RELEASE_BUCKET: "moz-fx-platform-shared-global-mozcloud-tools"
  WIF_SERVICE_ACCOUNT: "serviceAccount:bucket-object-user@moz-fx-platform-artifacts.iam.gserviceaccount.com"

jobs:
  # -----------------------------------------------------------------
  # Tag push → immutable versioned release at <tool>/vX.Y.Z/
  # -----------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Parse tool and version from tag
        id: parse
        run: |
          full="${GITHUB_REF_NAME}"
          tool="${full%%/*}"
          version="${full#*/}"
          echo "tool=${tool}"       >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: tools/${{ steps.parse.outputs.tool }}/go.mod
          cache: false

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.GCPV2_GITHUB_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8
        with:
          distribution: goreleaser
          version: "~> v2"
          workdir: tools/${{ steps.parse.outputs.tool }}
          args: release --clean
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.parse.outputs.version }}
          UPLOAD_DIR: ${{ steps.parse.outputs.version }}
          RELEASE_BUCKET: ${{ env.RELEASE_BUCKET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------------------------
  # Main push → rolling "latest" at <tool>/latest/ for all three tools
  # -----------------------------------------------------------------
  latest:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        tool: [mzcld, mozcloud-mcp, render-diff]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: tools/${{ matrix.tool }}/go.mod
          cache: false

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.GCPV2_GITHUB_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8
        with:
          distribution: goreleaser
          version: "~> v2"
          workdir: tools/${{ matrix.tool }}
          args: release --snapshot --clean
        env:
          UPLOAD_DIR: latest
          RELEASE_BUCKET: ${{ env.RELEASE_BUCKET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
