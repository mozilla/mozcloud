globals:
  version: v1alpha1
  app_code: <app_code>
  function: <function>
  risk_level: <risk_level>
  application_ports:
<application_ports_as_yaml_list>
  extra_attributes: {}
  deployment:
    type: argocd
    charts:
      <app_code>:
        application_repository: <application_repository>
        images:
          <image_name>:
            auto_update: true
  workgroups:
    - <workgroup>
realms:
  nonprod:
    project_id: moz-fx-<app_code>-nonprod
    environments:
      - name: dev
        charts:
          <app_code>:
            images:
              <image_name>:
                image_repository: us-docker.pkg.dev/moz-fx-<app_code>-prod/<app_code>-prod/<image_name>:latest
                update_strategy: digest
      - name: stage
        charts:
          <app_code>:
            images:
              <image_name>:
                image_regex: ^\d+\.\d+\.\d+$
    extra_attributes: {}
  prod:
    project_id: moz-fx-<app_code>-prod
    environments:
      - name: prod
        charts:
          <app_code>:
            images:
              <image_name>:
                image_regex: ^\d+\.\d+\.\d+$
    extra_attributes: {}
